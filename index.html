<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Security Assessment Tool</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>🔐 Password Security Assessment Tool</h1>

<div class="input-box">
    <input type="password" id="password" placeholder="Enter Password">
    <button id="toggleBtn">👁</button>
</div>

<div class="meter">
    <div id="meter-fill"></div>
</div>

<h3 id="strength">Waiting for input...</h3>

<div class="stats">
    <p><strong>Entropy:</strong> <span id="entropy">0</span> bits</p>
    <p><strong>Estimated Crack Time:</strong> <span id="crack">Instant</span></p>
</div>

<div class="recommendations">
    <h3>Security Recommendations</h3>
    <ul id="tips"></ul>
</div>

<div class="generator">
    <button id="generateBtn">Generate Secure Password</button>
    <button id="copyBtn">Copy Password</button>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
